<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <H2>This is a basic form</H2>
    
        <form >
            <table>
                <tr>
                    <td>
                        <label for="First name">First name</label>
                        <input type="text" id="First name" placeholder="Enter your First name" >
                    </td>
                </tr>
                <tr>    
                    <td>
                        <label for="last name">Last name</label>
                        <input type="text" id="last name" placeholder="Enter your last name">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="password">Password</label>
                        <input type="password" id="Password" placeholder="Enter password">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="Email">Email</label>
                        <input type="email" id="Email" placeholder="Youremail@.com">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="Number">Pno</label>
                        <input type="number" id="Pno" placeholder="Phone Number">
                    </td>
                </tr>
                <tr>
                    <td>
                       <label for="DOB">DOB</label>
                       <input type="date" id="DOB" placeholder="Enter your DOB">
                    </td>
                </tr>
            </table>
        </form>    
</body>
</html>
