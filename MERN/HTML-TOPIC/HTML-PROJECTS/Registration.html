<!DOCTYPE html>
<html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Registration Form</title>
        </head>
<body>
    <header>
        <h1>Registration Form For Student</h1>
    </header>    
    <main>
        <p>This is a Registartion Form for New Students</p>
        <img src="" alt="College">
        <a href="https://www.google.com">Search College here</a>
    </main>
    <section>
        <form>
            <div>
                <label for="Full Name">Full Name</label>
                <input type="text" name="Full Name" required placeholder="Enter your Full Name">
            </div>
            <div>
               <label for="Email">Email</label>
                <input type="email" name="Email"  id="Email" placeholder="Enter your Email">
            </div>

            <div>
                <label for="Phone Number">Tel</label>
                <input type="tel" name="Tel" required placeholder="Enter your Phone Number">
            </div>
            
            <div>
                <label for="Gender">Male</label>
                <input type="radio" name="Gender" id="Male" Select your Gender">
                <label for="Gender">Female</label>
                <input type="radio" name="Gender" id="Female" placeholder="Select your Gender">
            </div>
        
            <div>
                <label for="Date of Birth">DOB</label>
                <input type="date" name="Date of Birth" required placeholder="Select your DOB">
            </div>

            <div>
                <label for="Branch">Your Branch</label>
                <select name="Branch" id="Branch">
                <option value="CSE">CSE</option>
                <option value="ISE">ISE</option>
                <option value="AI">AI</option>
                <option value="EEE">EEE</option>
                <option value="CIVIL">CIVIL</option>
                </select>
            </div>

            <div>
                <label for="Year">Year Of Study</label>
                <select name="Year" id="Year">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                </select>
            </div> 

            <div>
                <label for="HTML">HTML</label>
                <input type="checkbox" name="HTML" value="HTML">
                        
                <label for="CSS">CSS</label>
                <input type="checkbox" name="CSS" value="CSS">

                <label for="JS">JS</label>
                <input type="checkbox" name="JS" value="JS">
            </div>
                
            <div>
                <label for="Resume">Resume</label>
                <input type="file" name="Resume" required>
            </div>

            <div>
                <label for="Note">Note</label>
                <textarea> </textarea>
            </div>

            <div>
                <label for="Accept Terms & Condition">Accept Terms & Conditio</label>
                <input type="checkbox" name="Accept Terms & Condition">
            </div>

            <div>
                <input type="submit" name="submit">
            </div>

            <div>
                <input type="reset" name="reset">
            </div>
        </form>
    </section>

    <footer>
        <p>Copyright @2026</p>
        <p>Contact through email</p>
    </footer>
</body>
</html>
